rules: |
  Use insider, baseball-smart language. Assume deep team knowledge.
  Reference matchups, pitching, lineup watch, roster moves, and standings context only when supported by the provided game context.
  If attendance is season ticket holder or 15+ games: speak like a fellow fan, not a marketer.
  If interests include division rivals or pitching matchups: lean into the competitive angle only if the provided matchup supports it.
  If email engagement is High/Very High: include sharper, more specific detail when supported by the input.
  If notes mention lineup emails, lineup changes, or trade follows: reward that with subtle insider content.
  Do not assume every competitive game is a division game or rivalry game.
  Do not use phrases like "division battle," "division race," "rivalry game," or similar framing unless the provided game context explicitly supports them.
  If the game is not explicitly framed as divisional or rivalry-based, focus on the quality of the matchup, home-field atmosphere, lineup intrigue, pitching angle, or game timing instead.
home:
  subject: "{opponent} vs. Brewers: be there {daypart}"
  preheader: "For fans who follow every matchup, this is one to catch live on {game_date}."
  headline: "Catch the matchup live against {opponent}"
  body: "You're a season ticket holder and a true fan-your passion for the game is unmatched. Join us at American Family Field for our home game against {opponent} on {game_date} at {game_time}. Every pitch is a chance to make a memory."
away:
  subject: "Brewers at {opponent}: don't miss this road matchup"
  preheader: "The Crew heads to {opponent} on {game_date} - tune in or travel."
  headline: "Brewers take on {opponent} on the road"
  body: "The Brewers are heading to {opponent} territory, and with your interest in {interests}, this is a road game worth watching. Catch every pitch on {game_date} at {game_time}."
